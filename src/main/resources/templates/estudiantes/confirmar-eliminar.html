<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmar Eliminación</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f4f6f8; }
    .card { background:white; padding:2rem; border-radius:8px; max-width:480px;
            box-shadow:0 2px 8px rgba(0,0,0,.1); }
    h1 { color:#C62828; }
    p { margin:.5rem 0; }
    .btn-del { padding:8px 16px; background:#C62828; color:white;
               border:none; border-radius:4px; cursor:pointer; }
    .btn-cancel { padding:8px 16px; background:#808080; color:white;
                  text-decoration:none; border-radius:4px; margin-left:.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>¿Eliminar Estudiante?</h1>
    <p><strong>Nombre:</strong> <span th:text="${estudiante.nombre + ' ' + estudiante.apellido}"></span></p>
    <p><strong>Correo:</strong> <span th:text="${estudiante.correo}"></span></p>
    <p><strong>Carrera:</strong> <span th:text="${estudiante.carrera}"></span></p>
    <br>
    <form th:action="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}" method="post">
      <button type="submit" class="btn-del">Sí, eliminar</button>
      <a th:href="@{/estudiantes}" class="btn-cancel">Cancelar</a>
    </form>
  </div>
</body>
</html>
