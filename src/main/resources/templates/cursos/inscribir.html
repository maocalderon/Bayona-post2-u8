<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inscribir Estudiante</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f4f6f8; }
    h1 { color: #065A82; }
    .card { background:white; padding:1.5rem; border-radius:8px; max-width:550px;
            box-shadow:0 2px 8px rgba(0,0,0,.1); }
    table { width:100%; border-collapse:collapse; margin-top:1rem; }
    th, td { border:1px solid #ddd; padding:8px 12px; text-align:left; }
    th { background:#065A82; color:white; }
    tr:nth-child(even) { background:#f5f5f5; }
    .btn { padding:5px 12px; background:#2E7D32; color:white; border:none;
           border-radius:4px; cursor:pointer; font-size:.875rem; }
    .btn-back { display:inline-block; margin-top:1rem; padding:8px 14px;
                background:#808080; color:white; text-decoration:none; border-radius:4px; }
    .ya-inscrito { color:#888; font-size:.8rem; }
  </style>
</head>
<body>
  <h1>Inscribir en: <span th:text="${curso.nombre}">Curso</span></h1>
  <div class="card">
    <p>Selecciona el estudiante a inscribir:</p>
    <table>
      <thead>
        <tr><th>Nombre</th><th>Carrera</th><th>Acción</th></tr>
      </thead>
      <tbody>
        <tr th:each="e : ${estudiantes}">
          <td th:text="${e.nombre + ' ' + e.apellido}"></td>
          <td th:text="${e.carrera}"></td>
          <td>
            <form th:if="${!curso.estudiantes.contains(e)}"
                  th:action="@{/cursos/{cId}/inscribir/{eId}(cId=${curso.id},eId=${e.id})}" method="post">
              <button type="submit" class="btn">Inscribir</button>
            </form>
            <span th:if="${curso.estudiantes.contains(e)}" class="ya-inscrito">✓ Ya inscrito</span>
          </td>
        </tr>
      </tbody>
    </table>
    <a th:href="@{/cursos}" class="btn-back">← Volver a Cursos</a>
  </div>
</body>
</html>
